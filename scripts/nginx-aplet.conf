server {
    listen 80;
    server_name aplet.ir www.aplet.ir;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aplet.ir www.aplet.ir;

    ssl_certificate /etc/nginx/ssl/aplet_cert.pem;
    ssl_certificate_key /etc/nginx/ssl/aplet_key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API → Web API Gateway (port 5010)
    location /api/ {
        proxy_pass http://host.docker.internal:5010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Frontend → Next.js (port 6090)
    location / {
        proxy_pass http://host.docker.internal:6090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
