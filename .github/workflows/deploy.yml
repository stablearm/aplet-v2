name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -euo pipefail

            APP_DIR="/opt/aplet"
            DEPLOY_LOG="/opt/aplet-deploy.log"
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

            log() { echo "[$TIMESTAMP] $1" | tee -a "$DEPLOY_LOG"; }

            log "Starting deployment..."
            cd "$APP_DIR"

            # Pull latest code
            log "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Build new image
            log "Building Docker image..."
            docker compose build --no-cache

            # Stop old container
            log "Stopping old container..."
            docker compose down

            # Start new container
            log "Starting new container..."
            docker compose up -d

            # Health check from host using curl (node:20-alpine has no wget/curl)
            log "Running health check..."
            HEALTHY=false
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:6090/ 2>/dev/null || true)
              if [ "$HTTP_CODE" = "200" ]; then
                HEALTHY=true
                break
              fi
              log "Waiting for container... ($i/12) HTTP=$HTTP_CODE"
              sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              log "HEALTH CHECK FAILED — rolling back..."
              PREV_IMAGE=$(docker images aplet-aplet -q --no-trunc | head -2 | tail -1)
              if [ -n "$PREV_IMAGE" ]; then
                docker compose down
                docker tag "$PREV_IMAGE" aplet-aplet:latest
                docker compose up -d
                log "Rollback complete."
              else
                log "No previous image. Manual intervention required."
              fi
              exit 1
            fi

            # Cleanup old images
            log "Cleaning up old images..."
            docker image prune -f --filter "until=168h"

            log "Deployment successful!"
