name: VPS Bootstrap

on:
  workflow_dispatch:
    inputs:
      host:
        description: "VPS IP address"
        required: true
      username:
        description: "SSH username"
        required: true
        default: root

jobs:
  setup:
    name: Bootstrap VPS
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ github.event.inputs.host }}
          username: ${{ github.event.inputs.username }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -euo pipefail

            echo "=== Aplet VPS Bootstrap ==="

            # Install Docker
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi

            # Install Docker Compose plugin
            if ! docker compose version &>/dev/null; then
              echo "Installing Docker Compose plugin..."
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            fi

            # Create app directory
            APP_DIR="/opt/aplet"
            sudo mkdir -p "$APP_DIR"
            sudo chown $USER:$USER "$APP_DIR"

            # Clone repo
            if [ -d "$APP_DIR/.git" ]; then
              echo "Repo already exists, pulling..."
              cd "$APP_DIR"
              git pull origin main
            else
              git clone https://github.com/stablearm/aplet-v2.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Create .env if missing
            if [ ! -f .env ]; then
              cat > .env << 'EOF'
NEXT_PUBLIC_API_URL=https://didegan.com
NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=apletbot
EOF
              echo "Created .env"
            fi

            # Install nginx
            if ! command -v nginx &>/dev/null; then
              sudo apt-get install -y nginx
            fi

            # Setup nginx config
            sudo cp scripts/nginx-aplet.conf /etc/nginx/sites-available/aplet
            sudo ln -sf /etc/nginx/sites-available/aplet /etc/nginx/sites-enabled/aplet
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            # SSL certs
            sudo mkdir -p /etc/nginx/ssl
            if [ -f aplet_cert.pem ] && [ -f aplet_key.pem ]; then
              sudo cp aplet_cert.pem /etc/nginx/ssl/
              sudo cp aplet_key.pem /etc/nginx/ssl/
            else
              echo "WARNING: SSL certs not found. Place aplet_cert.pem and aplet_key.pem in $APP_DIR"
            fi

            # Build and start
            docker compose up -d --build

            echo ""
            echo "=== Bootstrap Complete ==="
            echo "App: https://aplet.ir (port 6090 internal)"
            echo "Backend API: https://didegan.com (unchanged)"
