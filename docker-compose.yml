services:
  aplet:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: "https://didegan.com"
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-apletbot}
    container_name: aplet
    restart: unless-stopped
    ports:
      - "6090:6090"
    environment:
      - NODE_ENV=production
      - PORT=6090
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http = require('http'); const req = http.get('http://localhost:6090/', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.setTimeout(5000, () => { req.destroy(); process.exit(1); })\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
